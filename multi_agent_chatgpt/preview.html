<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Widget Preview Shell</title>
  <style>
    /* =============================================
       미리보기 쉘: 다양한 폭에서 위젯이 어떻게 보이는지
       나란히 확인할 수 있는 개발용 페이지
       ============================================= */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #e5e5e5;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      padding: 24px 16px;
    }
    h1 {
      font-size: 15px;
      font-weight: 700;
      color: #333;
      margin-bottom: 20px;
      text-align: center;
    }

    /* 각 해상도별 프레임을 세로로 쌓는다 */
    .preview-grid {
      display: flex;
      flex-direction: column;
      gap: 32px;
      align-items: center;
    }

    .preview-item {
      width: 100%;
      max-width: 900px;
    }

    .preview-label {
      font-size: 12px;
      color: #888;
      margin-bottom: 6px;
      padding-left: 4px;
    }
    .preview-label strong {
      color: #333;
      font-weight: 700;
    }

    /* 폰처럼 보이는 프레임 */
    .preview-frame-wrap {
      background: #fff;
      border-radius: 16px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.12);
      overflow: hidden;
      /* 가로 스크롤이 생기지 않도록 */
      overflow-x: hidden;
    }

    /* iframe: 고정 너비로 해상도별 시뮬레이션 */
    .preview-frame-wrap iframe {
      display: block;
      border: none;
      width: 100%;
      height: 600px;
    }

    /* 각 해상도별 max-width 제한 */
    .frame--390  { max-width: 390px;  }
    .frame--430  { max-width: 430px;  }
    .frame--768  { max-width: 768px;  }
    .frame--full { max-width: 100%;   }

    /* 상태 전환 버튼 그룹 */
    .state-btns {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-top: 8px;
    }
    .state-btn {
      padding: 5px 12px;
      font-size: 12px;
      border: 1.5px solid #aaa;
      border-radius: 6px;
      background: #fff;
      cursor: pointer;
      font-weight: 600;
      color: #333;
      transition: background 0.12s;
    }
    .state-btn:hover { background: #f0f0f0; }
    .state-btn[data-active="true"] { border-color: #10a37f; color: #10a37f; }
  </style>
</head>
<body>

<h1>Widget Preview Shell — 해상도별 미리보기</h1>

<div class="preview-grid">

  <!-- 390px (iPhone SE / 소형 폰) -->
  <div class="preview-item">
    <p class="preview-label"><strong>390px</strong> — iPhone SE / 소형 폰</p>
    <div class="preview-frame-wrap frame--390">
      <iframe src="widget.html" id="frame-390" title="Widget 390px"></iframe>
    </div>
  </div>

  <!-- 430px (iPhone Pro Max) -->
  <div class="preview-item">
    <p class="preview-label"><strong>430px</strong> — iPhone Pro Max / 대형 폰</p>
    <div class="preview-frame-wrap frame--430">
      <iframe src="widget.html" id="frame-430" title="Widget 430px"></iframe>
    </div>
  </div>

  <!-- 768px (태블릿 / iPad) -->
  <div class="preview-item">
    <p class="preview-label"><strong>768px</strong> — iPad / 태블릿</p>
    <div class="preview-frame-wrap frame--768">
      <iframe src="widget.html" id="frame-768" title="Widget 768px"></iframe>
    </div>
  </div>

  <!-- 데스크톱 (전체 너비) -->
  <div class="preview-item">
    <p class="preview-label"><strong>Desktop</strong> — 전체 너비</p>
    <div class="preview-frame-wrap frame--full">
      <iframe src="widget.html" id="frame-full" title="Widget Desktop"></iframe>
    </div>
  </div>

</div>

<script>
  /**
   * 미리보기 쉘에서 각 iframe의 상태를 수동으로 전환할 수 있다.
   * iframe에 postMessage를 보내 상태를 바꾸는 방식을 사용한다.
   *
   * 실제 ChatGPT 호스트가 하는 일을 여기서 시뮬레이션한다.
   */

  // iframe이 로드된 뒤 postMessage로 상태를 바꾸는 헬퍼
  function sendToFrame(frameId, method, params) {
    const frame = document.getElementById(frameId);
    if (!frame || !frame.contentWindow) return;
    frame.contentWindow.postMessage({ method, params }, '*');
  }

  // (옵션) 빈 상태 테스트: 해당 iframe에 빈 아이템 데이터를 보낸다
  // sendToFrame('frame-390', 'ui/notifications/tool-result', { result: { ...MOCK_DATA, items: [] } });

  // (옵션) 에러 상태 테스트
  // sendToFrame('frame-390', 'ui/error', { message: '서버 오류: 연결이 끊어졌습니다.' });
</script>

</body>
</html>
