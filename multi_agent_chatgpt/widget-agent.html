<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>멀티에이전트 위젯</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      width: 100%; background: transparent; overflow: hidden;
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Helvetica Neue", Arial, sans-serif;
      -webkit-font-smoothing: antialiased;
    }

    /* ── Shimmer ────────────────────────────── */
    @keyframes shimmer {
      0%   { background-position: 200% 0; }
      100% { background-position: -200% 0; }
    }
    .sh {
      background: linear-gradient(90deg, #f0f0f0 25%, #e4e4e4 50%, #f0f0f0 75%);
      background-size: 200% 100%;
      animation: shimmer 1.4s linear infinite;
    }

    /* ── Waveform (로딩) ────────────────────── */
    @keyframes wv {
      0%, 100% { transform: scaleY(0.35); }
      50%       { transform: scaleY(1); }
    }
    .wf { display: flex; align-items: center; gap: 2.5px; }
    .wf i {
      display: block; width: 3px; border-radius: 2px;
      background: #a0a0a0; transform-origin: center;
      animation: wv 0.85s ease-in-out infinite;
      font-style: normal;
    }
    .wf i:nth-child(1) { height: 8px;  animation-delay: 0s; }
    .wf i:nth-child(2) { height: 14px; animation-delay: 0.14s; }
    .wf i:nth-child(3) { height: 8px;  animation-delay: 0.28s; }

    /* ── 카드 헤더 ──────────────────────────── */
    .card-header {
      display: flex; align-items: center;
      height: 56px; padding: 0 8px 0 16px; gap: 8px;
    }
    .card-title {
      flex: 1; min-width: 0;
      font-size: 17px; font-weight: 510;
      line-height: 23px; letter-spacing: -0.43px; color: #000;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .card-counter {
      width: 44px; height: 44px; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      font-size: 14px; font-weight: 510;
      line-height: 20px; letter-spacing: -0.3px; color: #0d0d0d;
    }

    /* ── 에이전트 row ────────────────────────── */
    .agent-row {
      display: flex; flex-direction: column;
      padding: 12px 16px;
      border-bottom: 1px solid rgba(13,13,13,0.05);
    }
    .agent-row:last-child { border-bottom: none; }

    .row-top {
      display: flex; align-items: center; gap: 8px;
    }

    /* 썸네일 */
    .row-thumb {
      width: 44px; height: 44px; border-radius: 10px;
      flex-shrink: 0; overflow: hidden; background: #f0f0f0;
      position: relative;
    }
    .row-thumb img {
      position: absolute; inset: 0;
      width: 100%; height: 100%; object-fit: cover; display: block;
    }
    .row-thumb-ph { width: 44px; height: 44px; border-radius: 10px; flex-shrink: 0; }

    /* 에이전트 정보 */
    .row-info { flex: 1; min-width: 0; display: flex; flex-direction: column; gap: 2px; }
    .row-info-ph {
      flex: 1; min-width: 0;
      display: flex; flex-direction: column; gap: 8px; justify-content: center;
    }
    .info-ph-bar { height: 9px; border-radius: 12px; }

    .name-wrap { display: flex; align-items: center; gap: 3px; min-width: 0; }
    .agent-badge {
      width: 24px; height: 24px; border-radius: 100px;
      padding: 2px; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
    }
    .agent-badge img { width: 18px; height: 18px; display: block; }
    .agent-name {
      font-size: 17px; font-weight: 400;
      line-height: 18px; letter-spacing: -0.8px; color: #0d0d0d;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .agent-status {
      font-size: 14px; font-weight: 400;
      line-height: 20px; letter-spacing: -0.18px; color: #5d5d5d;
      display: flex; align-items: center; gap: 6px;
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    .spinner {
      width: 13px; height: 13px; flex-shrink: 0;
      border-radius: 50%;
      border: 2.5px solid #e0e0e0;
      border-top-color: #a0a0a0;
      animation: spin 1.1s linear infinite;
    }

    /* 액션 버튼 */
    .row-action {
      width: 44px; height: 44px; border-radius: 999px;
      flex-shrink: 0; border: none; cursor: default;
      display: flex; align-items: center; justify-content: center;
      transition: background 0.25s ease;
    }
    .row-action-ph { width: 44px; height: 44px; border-radius: 999px; flex-shrink: 0; }
    .row-action.is-loading { background: #f3f3f3; }
    .row-action.is-done    { background: #dbffd2; }
    @keyframes checkIn {
      0%   { opacity: 0; transform: scale(0.3); }
      65%  { transform: scale(1.2); }
      100% { opacity: 1; transform: scale(1); }
    }
    .row-action.is-done svg { animation: checkIn 0.4s cubic-bezier(0.34, 1.56, 0.64, 1) forwards; }

    /* 설명 */
    .row-desc { padding: 12px 3px 0; font-size: 14px; font-weight: 400; line-height: 20px; letter-spacing: -0.3px; color: #0d0d0d; }
    .desc-wrap { display: block; }
    .row-desc .desc-text {
      display: block; max-height: 40px; overflow: hidden; /* 애니메이션 중: 클리핑만, ... 없음 */
    }
    .row-desc .desc-text.is-clamped {
      display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical;
      overflow: hidden; max-height: none; /* 애니메이션 후: 말줄임표 활성화 */
    }
    /* float 트릭: 두 번째 줄 우측 35% 예약 → ~65% 지점에서 ... */
    .row-desc .desc-text.is-clamped::after {
      content: ''; float: right;
      width: 35%; height: 20px;
      margin-top: 20px;
    }
    .row-desc .desc-text.is-expanded {
      display: block; max-height: none; overflow: visible; -webkit-line-clamp: unset;
    }
    .row-desc .desc-text.is-expanded::after { display: none; }
    .row-desc .more {
      color: #808080; cursor: pointer;
      opacity: 0; visibility: hidden;
      transition: opacity 0.3s ease, visibility 0s 0.3s;
    }
    .row-desc .more.is-visible {
      opacity: 1; visibility: visible;
      transition: opacity 0.3s ease, visibility 0s 0s;
    }
    @keyframes wordIn {
      from { opacity: 0; transform: translateY(6px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .desc-word {
      display: inline;
      opacity: 0;
      animation: wordIn 0.35s ease-out forwards;
    }

    .row-desc-ph { padding: 12px 3px 10px; display: flex; flex-direction: column; gap: 12px; }
    .desc-ph-bar { height: 9px; border-radius: 12px; }

    /* ── 푸터 ────────────────────────────────── */
    .card-footer { padding: 16px; }
    .footer-btn {
      width: 100%; height: 44px; border-radius: 999px;
      border: none; display: flex; align-items: center; justify-content: center; gap: 6px;
      font-family: inherit;
      font-size: 15px; font-weight: 510;
      line-height: 24px; letter-spacing: -0.24px;
      cursor: pointer; transition: opacity 0.15s;
    }
    .footer-btn:active { opacity: 0.75; }
    .footer-btn.is-loading {
      background: #f3f3f3; color: #0d0d0d; cursor: default;
    }
    .footer-btn.is-done {
      background: #0d0d0d; color: #fff;
    }
    .footer-btn svg { flex-shrink: 0; }
    .footer-btn.is-skeleton { cursor: default; }
  </style>
</head>
<body>

<div id="card">
  <!-- 카드 헤더 -->
  <div class="card-header">
    <span class="card-title" id="cardTitle">최근 데이터 기반 삼성전자 주가</span>
    <span class="card-counter" id="cardCounter">0/4</span>
  </div>

  <!-- 에이전트 목록 (JS로 렌더링) -->
  <div id="agentList"></div>

  <!-- 푸터 -->
  <div class="card-footer">
    <button class="footer-btn is-loading" id="footerBtn">데이터 조회중..</button>
  </div>
</div>

<script>
/* ──────────────────────────────────────────
   에이전트 데이터
────────────────────────────────────────── */
var AGENTS = [
  {
    name: '밸류에이션 에이전트',
    pending: '밸류에이션 측정 중',
    color: '#ffcaca',
    icon: 'https://www.figma.com/api/mcp/asset/25192f09-c699-4859-9bce-f9ca95448f33',
    thumb: 'https://www.figma.com/api/mcp/asset/f4463801-d335-40c3-a1b3-99a78ef2188d',
    desc: '삼성전자의 현재 PER은 약 12.4배로, 반도체 섹터 평균(14.8배) 대비 약 16% 할인된 수준입니다. PBR 1.2배, 최근 3개년 평균 ROE 11.3%를 감안하면 현 주가는 적정가치 대비 저평가 구간으로 판단됩니다. HBM 수요 회복과 파운드리 수주 확대가 주요 재평가 촉매로 작용할 수 있습니다.'
  },
  {
    name: '뉴스 에이전트',
    pending: '뉴스 분석 중',
    color: '#dbffd2',
    icon: 'https://www.figma.com/api/mcp/asset/f5c3549a-1813-41ba-b083-adab1208667c',
    thumb: 'https://www.figma.com/api/mcp/asset/f4463801-d335-40c3-a1b3-99a78ef2188d',
    desc: '최근 7일 내 주요 부정 뉴스 없음. 시장 영향도 중립으로 판단됩니다.'
  },
  {
    name: '팩터 에이전트',
    pending: '팩터 분석 중',
    color: '#c7eeff',
    icon: 'https://www.figma.com/api/mcp/asset/cc4d5994-b849-4bc9-ac82-20fdcc6d4be4',
    thumb: 'https://www.figma.com/api/mcp/asset/f4463801-d335-40c3-a1b3-99a78ef2188d',
    desc: '모멘텀 팩터 -0.34(하위 30%), 퀄리티 팩터 +0.62(상위 40%), 밸류 팩터 +0.81(상위 25%)로 집계됩니다. 복합 팩터 스코어는 0.43으로 시장 대비 중립 우위이며, 저변동성 팩터에서 두드러진 강점이 확인됩니다.'
  },
  {
    name: '리포트 에이전트',
    pending: '리포트 생성 중',
    color: '#c0c6ff',
    icon: 'https://www.figma.com/api/mcp/asset/2519e611-3077-4d8f-b755-a9679abe6390',
    thumb: 'https://www.figma.com/api/mcp/asset/f4463801-d335-40c3-a1b3-99a78ef2188d',
    desc: '최근 12개 증권사 리포트 종합 결과, 목표주가 평균 82,400원(현재가 대비 +18.3% 상승 여력)이며 매수 9건·중립 3건·매도 0건으로 컨센서스는 긍정적입니다. 주요 리스크 요인으로 메모리 가격 하락 사이클 재진입, 미·중 반도체 규제 강화, 원화 강세 기조가 지목되었으며, 하반기 HBM3E 양산 확대 여부가 핵심 모니터링 포인트로 제시됩니다.'
  }
];

var SVG_CHECK = '<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#2da040" stroke-width="2.8" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>';

var SVG_VOICE = '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><line x1="12" y1="4" x2="12" y2="20"/><line x1="8" y1="7" x2="8" y2="17"/><line x1="16" y1="7" x2="16" y2="17"/><line x1="4" y1="10" x2="4" y2="14"/><line x1="20" y1="10" x2="20" y2="14"/></svg>';

/* ──────────────────────────────────────────
   더보기 확장 상태
────────────────────────────────────────── */
var expanded = [false, false, false, false];
var doneCount = 0;

/* ──────────────────────────────────────────
   행 내부 HTML — pending
────────────────────────────────────────── */
function pendingInner(a) {
  return '<div class="row-top">'
    + '<div class="row-thumb"><img src="' + a.thumb + '" alt="" loading="lazy"></div>'
    + '<div class="row-info">'
    +   '<div class="name-wrap">'
    +     '<div class="agent-badge" style="background:' + a.color + '"><img src="' + a.icon + '" alt="" loading="lazy"></div>'
    +     '<span class="agent-name">' + a.name + '</span>'
    +   '</div>'
    +   '<span class="agent-status">' + a.pending + '<span class="spinner"></span></span>'
    + '</div>'
    + '<button class="row-action is-loading"><div class="wf"><i></i><i></i><i></i></div></button>'
    + '</div>'
    + '<div class="row-desc-ph"><div class="desc-ph-bar sh" style="width:100%"></div><div class="desc-ph-bar sh" style="width:67%"></div></div>';
}

/* ──────────────────────────────────────────
   스켈레톤 행 내부 HTML
────────────────────────────────────────── */
function skeletonRowInner() {
  return '<div class="row-top">'
    + '<div class="row-thumb-ph sh"></div>'
    + '<div class="row-info-ph">'
    +   '<div class="info-ph-bar sh" style="width:160px"></div>'
    +   '<div class="info-ph-bar sh" style="width:107px"></div>'
    + '</div>'
    + '<div class="row-action-ph sh"></div>'
    + '</div>'
    + '<div class="row-desc-ph">'
    +   '<div class="desc-ph-bar sh" style="width:100%"></div>'
    +   '<div class="desc-ph-bar sh" style="width:67%"></div>'
    + '</div>';
}

/* ──────────────────────────────────────────
   스켈레톤 렌더 — 최초 로드 시 (데이터 없는 상태)
────────────────────────────────────────── */
function initSkeleton() {
  var html = '';
  for (var i = 0; i < 4; i++) {
    html += '<div class="agent-row">' + skeletonRowInner() + '</div>';
  }
  document.getElementById('agentList').innerHTML = html;
  document.getElementById('cardTitle').textContent = '최근 데이터 기반 삼성전자 주가';
  document.getElementById('cardCounter').textContent = '0/4';
  var btn = document.getElementById('footerBtn');
  btn.className = 'footer-btn is-skeleton sh';
  btn.textContent = '';
}

/* ──────────────────────────────────────────
   초기 렌더 — 4개 모두 pending 상태로 한 번만 그림
────────────────────────────────────────── */
function initRows() {
  var html = '';
  for (var i = 0; i < 4; i++) {
    html += '<div id="row-' + i + '" class="agent-row">' + pendingInner(AGENTS[i]) + '</div>';
  }
  document.getElementById('agentList').innerHTML = html;
  document.getElementById('cardCounter').textContent = '0/4';
  var btn = document.getElementById('footerBtn');
  btn.className = 'footer-btn is-loading';
  btn.textContent = '데이터 조회중..';
}

/* ──────────────────────────────────────────
   에이전트 하나를 done으로 전환
   이미지를 건드리지 않고 변경 요소만 외과적으로 업데이트
────────────────────────────────────────── */
function markDone(idx) {
  var row = document.getElementById('row-' + idx);
  if (!row) return;

  // 1) 설명 shimmer → 텍스트 애니메이션 시작 (웨이브폼·생각중... 유지)
  var ph = row.querySelector('.row-desc-ph');
  if (ph) {
    var desc = document.createElement('div');
    desc.className = 'row-desc';
    desc.innerHTML = '<p><span class="desc-text"></span></p>';
    ph.parentNode.replaceChild(desc, ph);
  }

  // 2) 텍스트 애니메이션 실행, 완료 후 체크 뱃지·상태 전환
  revealText(idx, function() {
    // 텍스트 다 나온 뒤 → 웨이브폼 페이드아웃 후 체크 바운스인
    var action = row.querySelector('.row-action');
    action.style.transition = 'opacity 0.15s ease, background 0.25s ease';
    action.style.opacity = '0';
    setTimeout(function() {
      row.querySelector('.agent-status').textContent = '분석 완료';
      action.className = 'row-action is-done';
      action.innerHTML = SVG_CHECK;
      action.style.opacity = '';
      action.style.transition = '';

      // 마지막 에이전트 — 체크 뱃지 바운스(400ms) 후 버튼 페이드 전환
      if (idx === 3) {
        setTimeout(function() {
          var btn = document.getElementById('footerBtn');
          btn.style.transition = 'opacity 0.25s ease';
          btn.style.opacity = '0';
          setTimeout(function() {
            btn.className = 'footer-btn is-done';
            btn.innerHTML = SVG_VOICE + '결과 생성하기';
            btn.style.opacity = '0';
            // 강제 reflow 후 페이드인
            btn.getBoundingClientRect();
            btn.style.transition = 'opacity 0.3s ease';
            btn.style.opacity = '';
          }, 250);
        }, 400);
      }
    }, 160);
  });

  doneCount = idx + 1;
  document.getElementById('cardCounter').textContent = doneCount + '/4';
  reportHeight();
}

/* ──────────────────────────────────────────
   텍스트 리빌 애니메이션 (좌→우 스위프)
────────────────────────────────────────── */
function revealText(idx, onDone) {
  var row = document.getElementById('row-' + idx);
  if (!row) return;
  var textSpan = row.querySelector('.desc-text');
  if (!textSpan) return;

  var words = AGENTS[idx].desc.split(' ');
  var html = words.map(function(w, i) {
    return '<span class="desc-word" style="animation-delay:' + (i * 35) + 'ms">' + w + ' </span>';
  }).join('');
  textSpan.innerHTML = html;
  reportHeight();

  // 마지막 단어 애니메이션 끝난 후 → 더보기 표시 + 콜백
  var totalDur = (words.length - 1) * 35 + 350;
  setTimeout(function() {
    if (textSpan.scrollHeight > textSpan.clientHeight) {
      var p = row.querySelector('.row-desc p');
      if (p) {
        var more = document.createElement('span');
        more.className = 'more is-visible';
        more.dataset.idx = String(idx);
        more.textContent = '[더보기]';
        p.appendChild(more);
      }
    }
    if (onDone) onDone();
  }, totalDur);
}

/* ──────────────────────────────────────────
   postMessage resize
────────────────────────────────────────── */
function reportHeight() {
  window.parent.postMessage({ type: 'resize', height: document.body.scrollHeight }, '*');
}

/* ──────────────────────────────────────────
   데모 자동 진행 — 에이전트 순서대로 done 처리 후 정지
────────────────────────────────────────── */
var DELAYS = [2000, 2000, 2000, 2000]; // 각 에이전트 완료 간격(ms)

function step(idx) {
  markDone(idx);
  if (idx < 3) setTimeout(function() { step(idx + 1); }, DELAYS[idx + 1]);
}

window.addEventListener('load', function() {
  initSkeleton();   // 1단계: 스켈레톤 shimmer
  reportHeight();

  // 카드 크기 변화 자동 감지 → iframe 높이 동기화
  if (window.ResizeObserver) {
    new ResizeObserver(reportHeight).observe(document.getElementById('card'));
  }

  setTimeout(function() {
    initRows();     // 2단계: pending 상태로 전환
    reportHeight();
    setTimeout(function() { step(0); }, DELAYS[0]); // 3단계: 순서대로 완료
  }, 1500);

  // 더보기 클릭 — desc-text에 is-expanded 추가
  document.getElementById('agentList').addEventListener('click', function(e) {
    var more = e.target.closest('.more');
    if (!more) return;
    var idx = parseInt(more.dataset.idx, 10);
    expanded[idx] = true;
    var textSpan = document.querySelector('#row-' + idx + ' .desc-text');
    if (textSpan) textSpan.classList.add('is-expanded');
    more.remove();
    reportHeight();
  });
});
</script>

</body>
</html>
